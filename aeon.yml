  morning-brief: { enabled: true, schedule: "0 7 * * *" }
  hacker-news-digest: { enabled: true, schedule: "0 7 * * *", model: "claude-sonnet-4-6" }
  paper-digest: { enabled: true, schedule: "0 7 * * *", model: "claude-sonnet-4-6" }
  daily-routine: { enabled: false, schedule: "0 7 * * *" }
  rss-digest: { enabled: false, schedule: "0 7 * * *" }
  reddit-digest: { enabled: false, schedule: "0 7 * * *" }
  telegram-digest: { enabled: false, schedule: "30 7 * * *", model: "claude-sonnet-4-6" } # digest from tracked Telegram channels

  # --- Mid-morning (10 AM CET) ---
  github-monitor: { enabled: true, schedule: "0 9 * * *" }
  github-trending: { enabled: true, schedule: "0 9 * * *", model: "claude-sonnet-4-6" }
  issue-triage: { enabled: false, schedule: "0 9 * * *" }
  pr-review: { enabled: false, schedule: "0 9 * * *" }
  auto-merge: { enabled: false, schedule: "0 14 * * *" }
  github-issues: { enabled: false, schedule: "0 9 * * *" }
  github-releases: { enabled: false, schedule: "30 9 * * *" }

  # --- Midday (1 PM CET) ---
