  token-movers: { enabled: true, schedule: "0 12 * * *", model: "claude-sonnet-4-6" }
  token-report: { enabled: true, schedule: "30 12 * * *", model: "claude-sonnet-4-6" }
  defi-overview: { enabled: true, schedule: "0 12 * * *", model: "claude-sonnet-4-6" }
  on-chain-monitor: { enabled: false, schedule: "0 12 * * *" }
  defi-monitor: { enabled: false, schedule: "0 12 * * *" }
  treasury-info: { enabled: false, schedule: "0 12 * * *" }
  distribute-tokens: { enabled: false, schedule: "workflow_dispatch", var: "" }
  monitor-polymarket: { enabled: false, schedule: "30 12 * * *", model: "claude-sonnet-4-6" }
  monitor-kalshi: { enabled: false, schedule: "0 13 * * *", model: "claude-sonnet-4-6" }
  monitor-runners: { enabled: false, schedule: "0 12 * * *" }
  token-pick: { enabled: false, schedule: "0 12 * * *" }
  market-context-refresh: { enabled: true, schedule: "0 13 * * *", model: "claude-sonnet-4-6" }
  narrative-tracker: { enabled: false, schedule: "30 13 * * *" }
  polymarket-comments: { enabled: false, schedule: "0 13 * * *" }
  unlock-monitor: { enabled: false, schedule: "0 10 * * 1" }

  # --- Afternoon (3 PM CET) ---
  deep-research: { enabled: true, schedule: "workflow_dispatch", var: "" } # on-demand — set var to research topic
  article: { enabled: false, schedule: "0 14 * * *" }
  technical-explainer: { enabled: false, schedule: "30 14 * * *" }
  digest: { enabled: false, schedule: "0 14 * * *" }
  research-brief: { enabled: false, schedule: "0 14 * * *" }
  last30: { enabled: false, schedule: "workflow_dispatch", var: "" }
  paper-pick: { enabled: false, schedule: "0 14 * * *" }
  search-skill: { enabled: false, schedule: "0 14 * * *" }
  security-digest: { enabled: false, schedule: "0 14 * * *" }
  idea-capture: { enabled: false, schedule: "0 14 * * *" }
  deal-flow: { enabled: false, schedule: "0 14 * * 1" }
  reg-monitor: { enabled: false, schedule: "0 14 * * 3" }

  # --- Repo intelligence (3 PM UTC) ---
  push-recap: { enabled: false, schedule: "0 15 * * *" }
  repo-article: { enabled: false, schedule: "0 15 * * *" }
  repo-actions: { enabled: false, schedule: "0 15 * * *" }
  repo-pulse: { enabled: false, schedule: "0 15 * * *" }
